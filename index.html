<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>TravelSnap — Your Travel Bucket List</title>
    <meta name="description" content="TravelSnap is your personal travel bucket list app. Plan dream destinations, track places you've visited, add must-see spots with AI suggestions, and store photo memories — all in one place." />
    <meta name="keywords" content="travel bucket list, travel planner, travel tracker, places to visit, travel destinations, travel app, itinerary planner, travel memories, photo travel journal" />
    <meta name="author" content="TravelSnap" />
    <link rel="canonical" href="https://travelsnap.app/" />

    <!-- Open Graph (social sharing / GEO) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TravelSnap" />
    <meta property="og:title" content="TravelSnap — Your Travel Bucket List" />
    <meta property="og:description" content="Plan where you want to go, track where you've been. Build your personal travel bucket list with AI-powered destination suggestions and photo memories." />
    <meta property="og:url" content="https://travelsnap.app/" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TravelSnap — Your Travel Bucket List" />
    <meta name="twitter:description" content="Plan where you want to go, track where you've been. Build your personal travel bucket list." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80" />

    <!-- GEO / structured hints for AI crawlers -->
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1A331E" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TravelSnap",
      "url": "https://travelsnap.app/",
      "description": "A personal travel bucket list app to plan destinations, track visits, add places of interest with AI suggestions, and store photo memories.",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
